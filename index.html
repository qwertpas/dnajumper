<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Powerful Springless Jumping using DNA-structured Transmission</title>
    <style>
        body {
            font-family: Georgia, 'Times New Roman', serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
            line-height: 1.6;
            color: #222;
            background: #fff;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .authors {
            text-align: center;
            margin-bottom: 2rem;
            color: #444;
        }

        .teaser {
            width: 100%;
            margin: 1.5rem 0;
        }

        .teaser img {
            width: 100%;
            display: block;
        }

        hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 2rem 0;
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
        }

        .links {
            margin: 1.5rem 0;
        }

        .links a {
            color: #0066cc;
            margin-right: 1.5rem;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            margin: 1rem 0;
            background: #000;
        }

        .video-container video,
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Powerful Springless Jumping using DNA-structured Transmission</h1>
    <p class="authors">
        Christopher Xu, Elliot Hawkes<br>
        University of California, Santa Barbara
    </p>

    <hr>

    <h2>Videos</h2>
    <div><strong>Zoomed in (1/36 speed)</strong></div>
    <div class="video-container">
        <video controls src="media/jump8v-36xslow.mov"></video>
    </div>

    <div><strong>Entire jump (1/4 speed)</strong></div>
    <div class="video-container">
        <video controls src="media/jump8v-4xslow.mov"></video>
    </div>

    <div><strong>Kinematic test</strong></div>
    <div class="video-container">
        <video controls src="media/kinematictest.mov"></video>
    </div>
    
    <hr>


    <h2>Poster</h2>
    <div class="teaser">
        <img src="media/poster.jpg" alt="Poster" style="width:100%;max-width:800px;display:block;margin:auto;">
    </div>

</body>
</html>
